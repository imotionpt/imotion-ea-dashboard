<body>
<div id="root"></div>

<!-- Microsoft Authentication Library - loaded once -->
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<script>
// ── MICROSOFT 365 CONFIGURATION ──
const MSAL_CONFIG = {
  auth: {
    clientId: "aaf8df4a-211e-420f-bb1e-4b9192c99d0b",
    authority: "https://login.microsoftonline.com/5de79cf9-bfe2-40d2-a39c-07a191ec2a0e",
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: {
    cacheLocation: "sessionStorage",
    storeAuthStateInCookie: false,
  }
};

const SITE_ID = "imotionpt.sharepoint.com,e20fa4e6-7f62-4574-829c-48beb7f4bf37,79e684a4-7f64-453b-ae3f-71a0d6b399c0";
const GRAPH_BASE = "https://graph.microsoft.com/v1.0";
const SCOPES = ["Sites.ReadWrite.All", "User.Read", "Files.ReadWrite.All"];

// List names in SharePoint
const LISTS = {
  tasks: "iMotion_Tasks",
  briefs: "iMotion_DailyBriefs",
  weekly: "iMotion_WeeklyReviews",
  config: "iMotion_AppConfig",
};

let msalInstance;
try {
  msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
} catch(e) {
  console.error("MSAL init error:", e);
}

// ── GRAPH API HELPER ──
async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("No accounts found");
  try {
    const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return result.accessToken;
  } catch(e) {
    const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return result.accessToken;
  }
}

async function graphCall(endpoint, method = "GET", body = null) {
  const token = await getToken();
  const options = {
    method,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
    }
  };
  if (body) options.body = JSON.stringify(body);
  const response = await fetch(`${GRAPH_BASE}${endpoint}`, options);
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `Graph API error: ${response.status}`);
  }
  if (response.status === 204) return null;
  return response.json();
}

// ── SHAREPOINT LIST OPERATIONS ──
async function spGetItems(listName, select, filter) {
  select = select || "";
  filter = filter || "";
  // Use fields($select=...) syntax so Graph filters within the expanded fields object
  const expandClause = select ? `fields($select=${select})` : "fields";
  let url = `/sites/${SITE_ID}/lists/${listName}/items?expand=${expandClause}&$select=id,fields`;
  if (filter) url += `&$filter=${filter}`;
  const data = await graphCall(url);
  return data.value.map(i => ({ spId: i.id, ...i.fields }));
}

async function spCreateItem(listName, fields) {
  const data = await graphCall(`/sites/${SITE_ID}/lists/${listName}/items`, "POST", { fields });
  return { spId: data.id, ...data.fields };
}

async function spUpdateItem(listName, spId, fields) {
  await graphCall(`/sites/${SITE_ID}/lists/${listName}/items/${spId}/fields`, "PATCH", fields);
}

async function spDeleteItem(listName, spId) {
  await graphCall(`/sites/${SITE_ID}/lists/${listName}/items/${spId}`, "DELETE");
}

// ── DATA CONVERSION: SharePoint fields <-> App format ──
function spToTask(sp) {
  return {
    id: sp.spId,
    spId: sp.spId,
    name: sp.Title || sp.Task_x0020_Name || sp.LinkTitle || "",
    category: sp.Catagory || sp.Category || "",
    owner: sp.Owner || "",
    delegatedTo: sp.DelegatedTo || "",
    status: sp.Status || "Not Started",
    priority: sp.Priority || "Medium",
    dueDate: sp.DueDate ? sp.DueDate.split("T")[0] : "",
    lastUpdate: sp.Modified ? sp.Modified.split("T")[0] : today(),
    nextAction: sp.NextAction || "",
    waitingOn: sp.WaitingOn || "",
    notes: sp.Notes || "",
    attachments: [],
    plannerLink: sp.PlannerLink || "",
  };
}

function taskToSp(task) {
  const fields = { Title: task.name };
  if(task.status) fields.Status = task.status;
  if(task.priority) fields.Priority = task.priority;
  if(task.nextAction && task.nextAction.trim()) fields.NextAction = task.nextAction;
  if(task.waitingOn && task.waitingOn.trim()) fields.WaitingOn = task.waitingOn;
  if(task.notes && task.notes.trim()) fields.Notes = task.notes;
  if(task.delegatedTo && task.delegatedTo.trim()) fields.DelegatedTo = task.delegatedTo;
  if(task.plannerLink && task.plannerLink.trim()) fields.PlannerLink = task.plannerLink;
  if(task.category && task.category.trim()) fields.Catagory = task.category;
  if(task.dueDate && task.dueDate.trim()) {
    try {
      const d = new Date(task.dueDate + "T12:00:00");
      if(!isNaN(d.getTime())) fields.DueDate = d.toISOString();
    } catch(e) { console.warn("Invalid date:", task.dueDate); }
  }
  return fields;
}

// ── CONSTANTS ──
const CATS = ['Marketing','Hiring','Operations','Personal HR','Clinical','Finance'];
const STATUSES = ['Not Started','In Progress','Waiting','Done'];
const PRIORITIES = ['High','Medium','Low'];
const CAT_C = {Marketing:'#FF7100',Hiring:'#3088D8',Operations:'#003E82','Personal HR':'#FF9852',Clinical:'#16A34A',Finance:'#8B5CF6'};
const PRI_C = {High:'#FF7100',Medium:'#3088D8',Low:'#94A3B8'};
const ST_C = {'Not Started':{bg:'#EFF6FF',text:'#1D4ED8'},'In Progress':{bg:'#FFF7ED',text:'#C2410C'},Waiting:{bg:'#FEFCE8',text:'#A16207'},Done:{bg:'#F0FDF4',text:'#166534'}};

// ── STATE ──
let S = {
  // Auth

function set(patch){Object.assign(S,patch);render();}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function isOverdue(t){return t.status!=='Done'&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date();}
function daysSince(d){if(!d)return 0;return Math.floor((Date.now()-new Date(d+'T12:00:00'))/86400000);}
function canEdit(){return S.user&&['admin','manager'].includes(S.user.role);}
function isAdmin(){return S.user&&S.user.role==='admin';}

function stats(){
  return {
    open:S.tasks.filter(t=>t.status!=='Done').length,
    overdue:S.tasks.filter(t=>isOverdue(t)).length,
    waiting:S.tasks.filter(t=>t.status==='Waiting').length,
    high:S.tasks.filter(t=>t.priority==='High'&&t.status!=='Done').length,
    delegated:S.tasks.filter(t=>t.delegatedTo&&t.status!=='Done').length,
    done:S.tasks.filter(t=>t.status==='Done').length,
    stale:S.tasks.filter(t=>t.status!=='Done'&&daysSince(t.lastUpdate)>=2).length,
  };
}

function filtered(){
  return S.tasks.filter(t=>{
    if(S.fStatus!=='All'&&t.status!==S.fStatus)return false;
    if(S.fCat!=='All'&&t.category!==S.fCat)return false;
    if(S.fPri!=='All'&&t.priority!==S.fPri)return false;
    if(S.search&&!t.name.toLowerCase().includes(S.search.toLowerCase())&&!(t.notes||'').toLowerCase().includes(S.search.toLowerCase()))return false;
    return true;
  });
}

// ── MICROSOFT LOGIN ──
async function initAuth() {
  if (!msalInstance) {
    set({loading:false, authMode:"pin"});
    return;
  }
  try {
    // Handle redirect response first
    await msalInstance.handleRedirectPromise();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      await loginWithAccount(accounts[0]);
    } else {
      set({loading:false});
    }
  } catch(e) {
    console.error("Auth init error:", e);
    set({loading:false, loginError: "Authentication error. Please try again."});
  }
}

async function loginWithAccount(account) {
  set({loading:true, loadingMsg:"Loading your dashboard..."});
  try {
    // Get user profile
    msalInstance.setActiveAccount(account);
    const me = await graphCall("/me");

    // Match to known users by email
    const email = me.mail || me.userPrincipalName || "";
    let matchedUser = S.users.find(u => u.email.toLowerCase() === email.toLowerCase());

    if (!matchedUser) {
      // Auto-create user entry if they have Microsoft 365 access
      matchedUser = {
        name: me.displayName || email,
        email: email,
        role: "viewer",
        title: me.jobTitle || "",
        active: true,
      };
    }

    if (!matchedUser.active) {
      set({loading:false, loginError:"Your account has been deactivated. Contact Pratik."});
      return;
    }

    // Load tasks from SharePoint
    set({loadingMsg:"Loading tasks from SharePoint..."});
    const spTasks = await spGetItems(LISTS.tasks, "id,Title,Status,Priority,Catagory,DueDate,NextAction,WaitingOn,Notes,DelegatedTo,PlannerLink,Owner,Modified");
    const tasks = spTasks.map(spToTask);

    // Load config from SharePoint
    set({loadingMsg:"Loading configuration..."});
    try {
      const configItems = await spGetItems(LISTS.config);
      const config = {...S.config};
      configItems.forEach(item => {
        const key = item.Title || item.ConfigKey;
        const val = item.ConfigValue || "";
        if(key === "OutlookCalendarUrl" && val) config.outlookUrl = val;
        else if(key === "TeamsUrl" && val) config.teamsUrl = val;
        else if(key === "PlannerUrl" && val) config.plannerUrl = val;
        else if(key === "ExcelTrackerUrl" && val) config.excelWebUrl = val;
        else if(key === "TeamsNotificationChannel" && val) config.teamsChannel = val;
        else if(key === "DelegateList" && val) {
          S.delegates = val.split(",").map(d=>d.trim()).filter(Boolean);
        }
      });
      S.config = config;
    } catch(e) {
      console.warn("Could not load config:", e);
    }

    // Load today's brief from SharePoint
    try {
      set({loadingMsg:"Loading today's brief..."});
      const todayStr = today();
      const briefs = await spGetItems(LISTS.briefs);
      const todayBrief = briefs.find(b => {
        const briefDate = (b.BriefDate || b.Title || "").split("T")[0];
        return briefDate === todayStr || (b.Title || "").includes(todayStr);
      });
      if(todayBrief) {
        S.brief = {
          priorities: todayBrief.TopPriorities || "",
          decisions: todayBrief.PendingDecisions || "",
          followups: todayBrief.Followups || "",
          stuck: todayBrief.StuckItems || "",
          submitted: true,
          time: todayBrief.SubmittedAt ? new Date(todayBrief.SubmittedAt).toLocaleTimeString() : "earlier today",
        };
      }
    } catch(e) {
      console.warn("Could not load brief:", e);
    }

    // Load this week's review
    try {
      const reviews = await spGetItems(LISTS.weekly);
      const weekStart = new Date();
      weekStart.setDate(weekStart.getDate() - weekStart.getDay());
      const weekStr = weekStart.toISOString().split("T")[0];
      const thisWeekReview = reviews.find(r => {
        const reviewDate = (r.WeekOf || r.Title || "").split("T")[0];
        return reviewDate >= weekStr;
      });
      if(thisWeekReview) {
        S.weekly = {
          wins: thisWeekReview.Wins || "",
          missed: thisWeekReview.MissedTasks || "",
          bottlenecks: thisWeekReview.Bottlenecks || "",
          suggestions: thisWeekReview.Suggestions || "",
          submitted: true,
        };
      }
    } catch(e) {
      console.warn("Could not load weekly review:", e);
    }

    set({
      user: matchedUser,
      msAccount: account,
      tasks: tasks,
      loading: false,
      loginError: "",
    });

  } catch(e) {
    console.error("Login error:", e);
    set({loading:false, loginError:"Could not load data from SharePoint. " + e.message});
  }
}

async function saveTask() {
  const form = S.form;
  const name = (document.getElementById('mf-name')||{}).value || form.name || '';
  if(!name.trim()){alert('Please enter a task name.');return;}

  const updated = {
    ...form,
    name: (document.getElementById('mf-name')||{}).value || form.name,
    category: (document.getElementById('mf-cat')||{}).value || form.category,
    priority: (document.getElementById('mf-pri')||{}).value || form.priority,
    status: (document.getElementById('mf-status')||{}).value || form.status,
    dueDate: (document.getElementById('mf-due')||{}).value || form.dueDate,
    owner: (document.getElementById('mf-owner')||{}).value || form.owner,
    delegatedTo: (document.getElementById('mf-delegate')||{}).value || "",
    nextAction: (document.getElementById('mf-next')||{}).value || form.nextAction,
    waitingOn: (document.getElementById('mf-waiting')||{}).value || form.waitingOn,
    notes: (document.getElementById('mf-notes')||{}).value || form.notes,
    plannerLink: (document.getElementById('mf-planner')||{}).value || form.plannerLink || '',
    lastUpdate: today(),
  };

  set({syncing:true});
  try {
    const spFields = taskToSp(updated);
    if(S.editId) {
      // Update existing
      const task = S.tasks.find(t=>t.id===S.editId);
      if(task && task.spId) {
        await spUpdateItem(LISTS.tasks, task.spId, spFields);
      }
      set({tasks:S.tasks.map(t=>t.id===S.editId?{...updated,id:S.editId,spId:t.spId}:t),showModal:false,syncing:false});
    } else {
      // Create new
      const created = await spCreateItem(LISTS.tasks, spFields);
      const newTask = {...updated, id:created.spId, spId:created.spId};
      set({tasks:[...S.tasks,newTask],showModal:false,syncing:false});
    }
  } catch(e) {
    console.error("Save error:", e);
    alert("Error saving task: " + e.message);
    set({syncing:false});
  }
}

async function markDone(id) {
  const task = S.tasks.find(t=>t.id===id);
  if(!task) return;
  set({syncing:true, tasks:S.tasks.map(t=>t.id===id?{...t,status:'Done',lastUpdate:today()}:t)});
  try {
    if(task.spId) await spUpdateItem(LISTS.tasks, task.spId, {Status:'Done'});
  } catch(e) { console.error("Mark done error:", e); }
  set({syncing:false});
}

async function delTask(id) {
  if(!confirm('Delete this task?')) return;
  const task = S.tasks.find(t=>t.id===id);
  set({tasks:S.tasks.filter(t=>t.id!==id), expandedId:S.expandedId===id?null:S.expandedId, syncing:true});
  try {
    if(task && task.spId) await spDeleteItem(LISTS.tasks, task.spId);
  } catch(e) { console.error("Delete error:", e); }
  set({syncing:false});
}

async function delegateTask(id, person) {
  const task = S.tasks.find(t=>t.id===id);
  set({syncing:true, tasks:S.tasks.map(t=>t.id===id?{...t,delegatedTo:person,lastUpdate:today()}:t), delegateFor:null});
  try {
    if(task && task.spId) await spUpdateItem(LISTS.tasks, task.spId, {DelegatedTo:person});
  } catch(e) { console.error("Delegate error:", e); }
  set({syncing:false});
}

    await spCreateItem(LISTS.briefs, {
      Title: `Daily Brief ${today()}`,

      PendingDecisions: S.brief.decisions,
      Followups: S.brief.followups,

      SubmittedAt: now.toISOString(),

    set({brief:{...S.brief,submitted:true,time:now.toLocaleTimeString()},briefTab:'view',syncing:false});

    set({brief:{...S.brief,submitted:true,time:new Date().toLocaleTimeString()},briefTab:'view',syncing:false});
  }
}

function render(){
  const root = document.getElementById('root');

  if(S.loading) {
    root.innerHTML = `<div class="loading-screen">
      <div class="loading-spinner"></div>
      <div style="color:#fff;font-size:14px;font-weight:500">${esc(S.loadingMsg)}</div>
      <div style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:8px">iMotion Physical Therapy</div>
    </div>`;
    return;
  }

  if(!S.user) {
    root.innerHTML = `<div class="login-wrap" style="margin-left:0">${loginHTML()}</div>`;
    attachLoginEvents();
    return;
  }

  const st = stats();
  let content = '';
  if(S.view==='dashboard') content = dashHTML(st);
  else if(S.view==='tasks') content = allTasksHTML();
  else if(S.view==='open') content = openHTML();
  else if(S.view==='delegated') content = delegatedHTML(st);
  else if(S.view==='brief') content = briefHTML();
  else if(S.view==='admin'&&isAdmin()) content = adminHTML();

  root.innerHTML = `
    <div class="app">
      ${sidebarHTML(st)}
      <div class="main">${content}</div>
    </div>
    ${S.showModal ? modalHTML() : ''}
  `;
  attachEvents();
}

function taskCardHTML(t){
  const over=isOverdue(t);
  const stale=daysSince(t.lastUpdate)>=2&&t.status!=='Done';
  const exp=S.expandedId===t.id;
  const delOpen=S.delegateFor===t.id;
  const cc=CAT_C[t.category]||'#888';
  const sc=ST_C[t.status]||ST_C['Not Started'];
  const pc=PRI_C[t.priority]||'#ccc';
  return `<div class="task-card" style="border-left-color:${pc};${over?'border-color:#FECACA;':''}">
    <div class="task-row" data-expand="${t.id}">
      <div style="flex:1;min-width:0">
        <div class="task-name${t.status==='Done'?' done':''}">${esc(t.name)}</div>
        <div class="task-meta">
          <span>${esc(t.owner)}</span>
          ${t.delegatedTo?`<span style="color:#3088D8;font-weight:600">→ ${esc(t.delegatedTo)}</span>`:''}
          <span>· Due ${fmtDate(t.dueDate)}</span>
          ${over?`<span style="color:#DC2626;font-weight:700">OVERDUE</span>`:''}
          ${stale&&!over?`<span style="color:#D97706">No update ${daysSince(t.lastUpdate)}d</span>`:''}
          ${(t.attachments||[]).length>0?`<span style="color:#3088D8">📎 ${t.attachments.length}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <span class="badge" style="background:${cc}18;color:${cc}">${esc(t.category)}</span>
        <span class="badge" style="background:${sc.bg};color:${sc.text}">${esc(t.status)}</span>
      </div>
      ${canEdit()?`<div class="task-actions" data-stop="1">
        ${t.status!=='Done'?`<button class="task-btn" style="color:#16A34A;border-color:#BBF7D0" data-done="${t.id}" title="Mark done">✓</button>`:''}
        <button class="task-btn" style="color:#1D4ED8;border-color:#BFDBFE" data-delopen="${t.id}" title="Delegate">↗</button>
        <button class="task-btn" style="color:#475569" data-edit="${t.id}" title="Edit">✎</button>
        <button class="task-btn" style="color:#DC2626;border-color:#FECACA" data-del="${t.id}" title="Delete">✕</button>
      </div>`:''}
    </div>
    ${delOpen?delegatePanelHTML(t):''}
    ${exp?expandHTML(t):''}
  </div>`;
}

function delegatePanelHTML(t){
  const chips=S.delegates.length===0
    ?`<span class="chip empty-msg">No delegates. Add in Admin Panel.</span>`
    :S.delegates.map(m=>`<button class="chip${t.delegatedTo===m?' active-chip':''}" data-delegate="${t.id}" data-person="${esc(m)}">${esc(m)}</button>`).join('');
  const remove=t.delegatedTo?`<button class="chip remove-chip" data-delegate="${t.id}" data-person="">Remove</button>`:'';
  return `<div class="delegate-panel" data-stop="1">
    <span class="delegate-panel-title">Delegate to:</span>
    ${chips}${remove}
  </div>`;
}

function expandHTML(t){
  return `<div class="expand-detail">
    <div><div class="expand-label">Next Action</div><div class="expand-val">${esc(t.nextAction)||'—'}</div></div>

function taskListHTML(tasks){
  if(!tasks||!tasks.length)return`<div class="no-tasks">No tasks here. 🎉</div>`;

}

function secHead(label,color){
  return `<div class="sec-head"><div class="sec-bar" style="background:${color}"></div><span style="color:${color}">${label}</span></div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.addEventListener('click',()=>set({view:el.dataset.view,delegateFor:null,expandedId:null}));
  });
  const bAdd=document.getElementById('btn-add-task');
  if(bAdd)bAdd.addEventListener('click',()=>set({showModal:true,editId:null,form:emptyForm()}));
  const bAdd2=document.getElementById('btn-add-task2');
  if(bAdd2)bAdd2.addEventListener('click',()=>set({showModal:true,editId:null,form:emptyForm()}));
  const bOut=document.getElementById('btn-signout');
  if(bOut)bOut.addEventListener('click',doSignOut);
  const bExp=document.getElementById('btn-export');
  if(bExp)bExp.addEventListener('click',exportData);
  const bRef=document.getElementById('btn-refresh');
  if(bRef)bRef.addEventListener('click',refreshTasks);

  document.querySelectorAll('[data-expand]').forEach(el=>{
    el.addEventListener('click',()=>{const id=el.dataset.expand;set({expandedId:S.expandedId===id?null:id});});
  });
  document.querySelectorAll('[data-stop]').forEach(el=>{
    el.addEventListener('click',e=>e.stopPropagation());
  });
  document.querySelectorAll('[data-done]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();markDone(el.dataset.done);});
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();delTask(el.dataset.del);});
  });
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();const t=S.tasks.find(t=>t.id===el.dataset.edit);if(t)set({showModal:true,editId:el.dataset.edit,form:{...t}});});
  });
  document.querySelectorAll('[data-delopen]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();const id=el.dataset.delopen;set({delegateFor:S.delegateFor===id?null:id});});
  });
  document.querySelectorAll('[data-delegate]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();delegateTask(el.dataset.delegate,el.dataset.person);});
  });
  document.querySelectorAll('[data-btab]').forEach(el=>{el.addEventListener('click',()=>set({briefTab:el.dataset.btab}));});
  document.querySelectorAll('[data-wtab]').forEach(el=>{el.addEventListener('click',()=>set({weeklyTab:el.dataset.wtab}));});
  document.querySelectorAll('[data-brief]').forEach(el=>{el.addEventListener('input',()=>{S.brief[el.dataset.brief]=el.value;});});
  document.querySelectorAll('[data-weekly]').forEach(el=>{el.addEventListener('input',()=>{S.weekly[el.dataset.weekly]=el.value;});});

  const bBrief=document.getElementById('btn-brief-submit');
  if(bBrief)bBrief.addEventListener('click',submitBrief);
  const bWeekly=document.getElementById('btn-weekly-submit');
  if(bWeekly)bWeekly.addEventListener('click',submitWeekly);

  const fSearch=document.getElementById('f-search');
  if(fSearch)fSearch.addEventListener('input',e=>set({search:e.target.value}));
  const fStatus=document.getElementById('f-status');
  if(fStatus)fStatus.addEventListener('change',e=>set({fStatus:e.target.value}));
  const fCat=document.getElementById('f-cat');
  if(fCat)fCat.addEventListener('change',e=>set({fCat:e.target.value}));
  const fPri=document.getElementById('f-pri');
  if(fPri)fPri.addEventListener('change',e=>set({fPri:e.target.value}));

  document.querySelectorAll('[data-rem-delegate]').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=el.dataset.remDelegate;
      const newDelegates = S.delegates.filter(d=>d!==n);
      set({delegates:newDelegates});
      saveDelegateListToSP(newDelegates);
    });
  });
  document.querySelectorAll('[data-toggle-delegate]').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=el.dataset.toggleDelegate;
      const newDelegates = S.delegates.includes(n)?S.delegates.filter(d=>d!==n):[...S.delegates,n];
      set({delegates:newDelegates});
      saveDelegateListToSP(newDelegates);
    });
  });
  const bAddDel=document.getElementById('btn-add-delegate');
  if(bAddDel)bAddDel.addEventListener('click',addDelegate);
  const ndInput=document.getElementById('new-delegate-input');
  if(ndInput){
    ndInput.addEventListener('input',e=>S.newDelegate=e.target.value);
    ndInput.addEventListener('keydown',e=>{if(e.key==='Enter')addDelegate();});
  }
  document.querySelectorAll('[data-toggle-active]').forEach(el=>{
    el.addEventListener('click',()=>{const em=el.dataset.toggleActive;set({users:S.users.map(u=>u.email===em?{...u,active:!u.active}:u)});});
  });
  document.querySelectorAll('[data-role]').forEach(el=>{
    el.addEventListener('change',()=>{const em=el.dataset.role;set({users:S.users.map(u=>u.email===em?{...u,role:el.value}:u)});});
  });
  const bInvite=document.getElementById('btn-invite');
  if(bInvite)bInvite.addEventListener('click',sendInvite);
  document.querySelectorAll('[data-cfg]').forEach(el=>{
    el.addEventListener('input',()=>{S.config[el.dataset.cfg]=el.value;});
  });
  ['nu-name','nu-email','nu-title'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('input',()=>{const key={'nu-name':'name','nu-email':'email','nu-title':'title'}[id];S.newUser[key]=el.value;});
  });
  const nuRole=document.getElementById('nu-role');
  if(nuRole)nuRole.addEventListener('change',()=>S.newUser.role=nuRole.value);

  const mbg=document.getElementById('modal-bg');
  if(mbg)mbg.addEventListener('click',e=>{if(e.target===mbg)set({showModal:false});});
  const bClose=document.getElementById('btn-modal-close');
  if(bClose)bClose.addEventListener('click',()=>set({showModal:false}));
  const bClose2=document.getElementById('btn-modal-close2');
  if(bClose2)bClose2.addEventListener('click',()=>set({showModal:false}));
  const bSave=document.getElementById('btn-save');
  if(bSave)bSave.addEventListener('click',saveTask);

  document.querySelectorAll('[data-rem-att]').forEach(el=>{
    el.addEventListener('click',()=>{const i=parseInt(el.dataset.remAtt);S.form.attachments=S.form.attachments.filter((_,j)=>j!==i);render();});
  });
  const fileDrop=document.getElementById('file-drop');
  const fileInput=document.getElementById('file-input');
  if(fileDrop&&fileInput){
    fileDrop.addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',e=>{
      const files=Array.from(e.target.files);
      S.form.attachments=[...(S.form.attachments||[]),...files.map(f=>({name:f.name,size:(f.size/1024).toFixed(1)+' KB'}))];
      render();
    });
  }
}

async function saveDelegateListToSP(delegates) {
  try {
    const configItems = await spGetItems(LISTS.config);
    const delegateItem = configItems.find(i => i.Title === "DelegateList");
    if(delegateItem && delegateItem.spId) {
      await spUpdateItem(LISTS.config, delegateItem.spId, {ConfigValue: delegates.join(",")});
    }
  } catch(e) {
    console.warn("Could not save delegate list:", e);
  }
}

function addDelegate(){
  const input=document.getElementById('new-delegate-input');
  const name=(input?input.value:S.newDelegate).trim();
  if(!name||S.delegates.includes(name))return;
  const newDelegates = [...S.delegates, name];
  set({delegates:newDelegates, newDelegate:''});
  saveDelegateListToSP(newDelegates);
}

function sendInvite(){
  const nu=S.newUser;
  const name=(document.getElementById('nu-name')||{}).value||nu.name;
  const email=(document.getElementById('nu-email')||{}).value||nu.email;
  const title=(document.getElementById('nu-title')||{}).value||nu.title;
  const role=(document.getElementById('nu-role')||{}).value||nu.role;
  if(!name||!email){alert('Please enter name and email.');return;}
  set({users:[...S.users,{name,email,role,title,active:true}],newUser:{name:'',email:'',role:'staff',title:''},inviteSent:true});
  setTimeout(()=>set({inviteSent:false}),3000);
}

function exportData(){
  if(S.config.excelWebUrl){window.open(S.config.excelWebUrl,'_blank');return;}
  const rows=[['Task','Category','Owner','Delegated To','Status','Priority','Due Date','Next Action','Waiting On','Notes']];
  S.tasks.forEach(t=>rows.push([t.name,t.category,t.owner,t.delegatedTo,t.status,t.priority,t.dueDate,t.nextAction,t.waitingOn,t.notes]));
  const csv=rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='iMotion_Tasks.csv';a.click();
}

function esc(s){
  if(s===null||s===undefined)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── START ──
render();
initAuth();
</script>
